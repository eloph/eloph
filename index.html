<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐧 企鹅小纸条 · 企鹅岛心情日记 🐧</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #e3f2fd 0%, #bbdefb 50%, #90caf9 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景漂浮元素 */
        .floating-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-item {
            position: absolute;
            animation: float 20s infinite ease-in-out;
            opacity: 0.3;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(10deg); }
            50% { transform: translateY(0) rotate(0deg); }
            75% { transform: translateY(20px) rotate(-10deg); }
        }

        /* 页面容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* 顶部横幅 */
        .header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #64b5f6 0%, #42a5f5 100%);
            border-radius: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(100, 181, 246, 0.4);
            position: relative;
            overflow: hidden;
        }

        .penguin-family {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .penguin-banner {
            font-size: 60px;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .penguin-banner:nth-child(2) { animation-delay: 0.2s; }
        .penguin-banner:nth-child(3) { animation-delay: 0.4s; }
        .penguin-banner:nth-child(4) { animation-delay: 0.6s; }
        .penguin-banner:nth-child(5) { animation-delay: 0.8s; }

        .header h1 {
            color: white;
            font-size: 2.5rem;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.2);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .header-avatar {
            font-size: 40px;
            cursor: pointer;
            transition: transform 0.3s;
            position: relative;
        }

        .header-avatar:hover {
            transform: scale(1.1);
        }

        .avatar-selector {
            position: absolute;
            top: 100%;
            right: 50%;
            transform: translateX(50%);
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            z-index: 1000;
            margin-top: 10px;
        }

        .avatar-option {
            font-size: 30px;
            cursor: pointer;
            padding: 10px;
            border-radius: 10px;
            transition: all 0.3s;
            text-align: center;
        }

        .avatar-option:hover {
            background: #e3f2fd;
            transform: scale(1.1);
        }

        .avatar-selector.hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .header h1 {
                flex-direction: column;
                gap: 10px;
            }

            .avatar-selector {
                right: auto;
                left: 50%;
                transform: translateX(-50%);
            }
        }

        .daily-quote {
            color: #e3f2fd;
            font-size: 1.2rem;
            font-style: italic;
            margin-bottom: 20px;
        }

        .write-btn {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 152, 0, 0.5);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .write-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(255, 152, 0, 0.7);
        }

        .write-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -50%; }
            100% { left: 150%; }
        }

        /* 主内容区 */
        .main-content {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        /* 侧边栏 */
        .sidebar {
            width: 300px;
            flex-shrink: 0;
        }

        @media (max-width: 900px) {
            .sidebar {
                width: 100%;
            }
        }

        .resident-card {
            background: white;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            position: relative;
        }

        .resident-card::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border: 4px dashed #64b5f6;
            border-radius: 30px;
            pointer-events: none;
        }

        .resident-card h2 {
            color: #1976d2;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .resident-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .resident-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 15px;
            transition: transform 0.3s;
        }

        .resident-item:hover {
            transform: translateX(5px);
            background: #e3f2fd;
        }

        .resident-avatar {
            font-size: 40px;
        }

        .resident-info h3 {
            color: #333;
            font-size: 1rem;
        }

        .resident-info p {
            color: #666;
            font-size: 0.85rem;
        }

        .stats-card {
            background: white;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }

        .stats-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px 0;
            border-bottom: 1px dashed #e0e0e0;
        }

        .stats-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .stats-label {
            color: #666;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-value {
            color: #1976d2;
            font-weight: bold;
            font-size: 1.5rem;
        }

        .tip-card {
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }

        .tip-card h3 {
            color: #e65100;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tip-text {
            color: #4e342e;
            line-height: 1.6;
        }

        /* 笔记列表 */
        .notes-section {
            flex: 1;
            min-width: 300px;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }

        .empty-penguin {
            font-size: 100px;
            animation: wobble 2s infinite ease-in-out;
            margin-bottom: 20px;
        }

        @keyframes wobble {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .empty-text {
            color: #666;
            font-size: 1.3rem;
        }

        .note-card {
            background: white;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            position: relative;
            transition: all 0.3s;
        }

        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.18);
        }

        .note-card::before,
        .note-card::after,
        .note-card .paw-tl,
        .note-card .paw-br {
            content: '🐾';
            position: absolute;
            font-size: 24px;
            opacity: 0.4;
            transition: all 0.3s;
        }

        .note-card::before {
            top: 10px;
            left: 10px;
        }

        .note-card::after {
            top: 10px;
            right: 10px;
        }

        .note-card .paw-tl {
            bottom: 10px;
            left: 10px;
        }

        .note-card .paw-br {
            bottom: 10px;
            right: 10px;
        }

        .note-card:hover::before,
        .note-card:hover::after,
        .note-card:hover .paw-tl,
        .note-card:hover .paw-br {
            opacity: 0.8;
            transform: scale(1.2);
        }

        .note-card.fish-10 {
            border: 3px solid #e0e0e0;
        }

        .note-card.fish-30 {
            border: 3px solid #ffd700;
        }

        .note-card.fish-50 {
            border: 3px solid transparent;
            background: white;
            background-image: linear-gradient(white, white), 
                linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            background-origin: border-box;
            background-clip: padding-box, border-box;
        }

        .note-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .note-avatar {
            font-size: 50px;
        }

        .note-author-info {
            flex: 1;
        }

        .note-author {
            color: #333;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .note-time {
            color: #999;
            font-size: 0.9rem;
        }

        .mood-tag {
            font-size: 35px;
        }

        .note-content {
            color: #333;
            line-height: 1.8;
            margin-bottom: 20px;
            font-size: 1.05rem;
        }

        .note-images {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .note-image {
            width: 100%;
            padding-top: 100%;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .note-image:hover {
            transform: scale(1.05);
        }

        .note-image img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .note-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .edit-btn {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            color: #1976d2;
        }

        .edit-btn:hover {
            background: linear-gradient(135deg, #bbdefb 0%, #90caf9 100%);
        }

        .delete-btn {
            background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
            color: #c62828;
        }

        .delete-btn:hover {
            background: linear-gradient(135deg, #ffcdd2 0%, #ef9a9a 100%);
        }

        .comment-btn {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            color: #2e7d32;
        }

        .comment-btn:hover {
            background: linear-gradient(135deg, #c8e6c9 0%, #a5d6a7 100%);
        }

        .fish-count {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 5px;
            color: #ff9800;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .comments-section {
            background: #fafafa;
            border-radius: 15px;
            padding: 20px;
            margin-top: 15px;
        }

        .comments-section.hidden {
            display: none;
        }

        .comment-list {
            margin-bottom: 15px;
        }

        .comment-item {
            display: flex;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px dashed #e0e0e0;
        }

        .comment-item:last-child {
            border-bottom: none;
        }

        .comment-avatar {
            font-size: 30px;
        }

        .comment-content {
            flex: 1;
        }

        .comment-author {
            color: #1976d2;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .comment-text {
            color: #555;
            margin-top: 3px;
        }

        .comment-input-wrapper {
            display: flex;
            gap: 10px;
        }

        .comment-input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .comment-input:focus {
            border-color: #64b5f6;
        }

        .comment-submit {
            padding: 10px 20px;
            background: linear-gradient(135deg, #64b5f6 0%, #42a5f5 100%);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .comment-submit:hover {
            transform: scale(1.05);
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 30px;
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: modalSlide 0.3s ease-out;
        }

        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: translateY(-50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #64b5f6 0%, #42a5f5 100%);
            padding: 25px;
            text-align: center;
            border-radius: 30px 30px 0 0;
            color: white;
        }

        .modal-header h2 {
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .modal-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 1rem;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-textarea:focus {
            border-color: #64b5f6;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            border-color: #64b5f6;
        }

        .mood-selector {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .mood-option {
            font-size: 40px;
            padding: 10px;
            border-radius: 15px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
        }

        .mood-option:hover {
            transform: scale(1.1);
            background: #e3f2fd;
        }

        .mood-option.selected {
            border-color: #64b5f6;
            background: #bbdefb;
        }

        .upload-area {
            border: 3px dashed #64b5f6;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            background: #e3f2fd;
        }

        .upload-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .upload-text {
            color: #666;
        }

        .preview-images {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .preview-item {
            position: relative;
            width: 100%;
            padding-top: 100%;
            border-radius: 12px;
            overflow: hidden;
        }

        .preview-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preview-remove {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
        }

        .modal-footer {
            padding: 20px 30px 30px;
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .cancel-btn {
            background: #e0e0e0;
            color: #333;
        }

        .submit-btn {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            color: white;
        }

        .submit-btn:hover {
            transform: scale(1.05);
        }

        /* 确认对话框 */
        .confirm-modal .modal-content {
            max-width: 450px;
        }

        .confirm-body {
            text-align: center;
            padding: 40px 30px;
        }

        .confirm-penguin {
            font-size: 70px;
            margin-bottom: 20px;
        }

        .confirm-text {
            color: #333;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        /* 图片灯箱 */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 30px;
            cursor: pointer;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 15px;
        }

        /* 底部 */
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: #1976d2;
        }

        .footer-penguin {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .footer-text {
            font-size: 1.2rem;
        }

        /* 加载动画 */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #e3f2fd 0%, #bbdefb 50%, #90caf9 100%);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 0.5s;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-penguin {
            font-size: 80px;
            animation: loadBounce 1s infinite;
        }

        @keyframes loadBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        .loading-text {
            color: #1976d2;
            font-size: 1.3rem;
            margin-top: 20px;
        }

        /* 新纸条动画 */
        .new-note-animation {
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 删除动画 */
        .delete-animation {
            animation: melt 0.5s ease-out forwards;
        }

        @keyframes melt {
            to {
                opacity: 0;
                transform: scale(0.8) rotate(5deg);
            }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .penguin-family {
                gap: 15px;
            }

            .penguin-banner {
                font-size: 40px;
            }

            .note-images {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- 加载屏幕 -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-penguin">🐧</div>
        <div class="loading-text">🐧 噗噗噗... 企鹅岛加载中 🐧</div>
    </div>

    <!-- 背景漂浮元素 -->
    <div class="floating-bg" id="floatingBg"></div>

    <div class="container">
        <!-- 顶部横幅 -->
        <header class="header">
            <div class="penguin-family">
                <span class="penguin-banner">🐧</span>
                <span class="penguin-banner">🎩</span>
                <span class="penguin-banner">🕶️</span>
                <span class="penguin-banner">☕</span>
                <span class="penguin-banner">❄️</span>
            </div>
            <h1>
                <span class="header-avatar" onclick="toggleAvatarSelector()">
                    <span id="currentAvatar">🐧</span>
                    <div class="avatar-selector hidden" id="avatarSelector"></div>
                </span>
                企鹅小纸条 · 今天开心吗？
                <span class="header-avatar" onclick="toggleAvatarSelector()">
                    <span id="currentAvatar2">🐧</span>
                </span>
            </h1>
            <div class="daily-quote" id="dailyQuote"></div>
            <button class="write-btn" onclick="openWriteModal()">✏️ 写新纸条</button>
        </header>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 侧边栏 -->
            <aside class="sidebar">
                <!-- 企鹅岛居民 -->
                <div class="resident-card">
                    <h2>🏝️ 企鹅岛居民</h2>
                    <div class="resident-list" id="residentList"></div>
                </div>

                <!-- 统计 -->
                <div class="stats-card">
                    <div class="stats-item">
                        <span class="stats-label">📝 今日开心纸条</span>
                        <span class="stats-value" id="todayCount">0</span>
                    </div>
                    <div class="stats-item">
                        <span class="stats-label">🐟 总小鱼干数</span>
                        <span class="stats-value" id="totalFish">0</span>
                    </div>
                </div>

                <!-- 企鹅小贴士 -->
                <div class="tip-card">
                    <h3>💡 企鹅小贴士</h3>
                    <p class="tip-text" id="penguinTip"></p>
                </div>
            </aside>

            <!-- 笔记列表 -->
            <main class="notes-section" id="notesList"></main>
        </div>

        <!-- 底部 -->
        <footer class="footer">
            <div class="footer-penguin">😴</div>
            <div class="footer-text">🐧 今天也是被企鹅治愈的一天 🐧</div>
        </footer>
    </div>

    <!-- 写笔记模态框 -->
    <div class="modal" id="writeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🐟 写一张新纸条 🐟</h2>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">💬 今天发生了什么开心的事？</label>
                    <textarea class="form-textarea" id="noteContent" placeholder="快说说你的开心事~"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">😊 今天的心情是？</label>
                    <div class="mood-selector" id="moodSelector"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">🖼️ 上传图片（最多9张）</label>
                    <div class="upload-area" onclick="document.getElementById('imageInput').click()">
                        <div class="upload-icon">📸</div>
                        <div class="upload-text">点击或拖拽图片到这里</div>
                        <input type="file" id="imageInput" multiple accept="image/*" style="display:none" onchange="handleImageUpload(event)">
                    </div>
                    <div class="preview-images" id="previewImages"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">🐧 你的昵称</label>
                    <input type="text" class="form-input" id="noteAuthor" placeholder="kk的小企鹅朋友">
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel-btn" onclick="closeWriteModal()">取消</button>
                <button class="modal-btn submit-btn" onclick="submitNote()">🐟 发布</button>
            </div>
        </div>
    </div>

    <!-- 确认删除模态框 -->
    <div class="modal confirm-modal" id="confirmModal">
        <div class="modal-content">
            <div class="confirm-body">
                <div class="confirm-penguin">🥺</div>
                <div class="confirm-text">确定要丢掉这张小纸条吗？</div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel-btn" onclick="closeConfirmModal()">再想想</button>
                <button class="modal-btn submit-btn" onclick="confirmDelete()">确定删除</button>
            </div>
        </div>
    </div>

    <!-- 图片灯箱 -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <img id="lightboxImg" src="" alt="">
    </div>

    <script>
        // 数据存储
        const STORAGE_KEY = 'penguin_notes';
        const RESIDENTS_KEY = 'penguin_residents';

        // 预设数据
        const moods = [
            { emoji: '😄', name: '开心' },
            { emoji: '🥳', name: '超激动' },
            { emoji: '😴', name: '困困' },
            { emoji: '😎', name: '酷' },
            { emoji: '🥰', name: '爱了' },
            { emoji: '🤩', name: '哇塞' },
            { emoji: '😊', name: '平静' },
            { emoji: '😋', name: '好吃' }
        ];

        const penguinAvatars = ['🐧', '🎩', '🕶️', '☕', '❄️', '⭐', '🎨', '🎵'];

        const dailyQuotes = [
            '每只企鹅都有自己独特的滑行方式~',
            '企鹅不会飞，但它们会用肚皮滑雪！',
            '每天都是被企鹅治愈的一天~',
            '企鹅爸爸会用石头定情哦~',
            '企鹅可以潜入水下1800英尺深！',
            '企鹅是一夫一妻制呢~'
        ];

        const penguinTips = [
            '企鹅的膝盖藏在羽毛里！',
            '企鹅可以喝海水，它们有特殊的腺体过滤盐分~',
            '企鹅是游泳健将，最快可达36公里/小时！',
            '企鹅的羽毛密度是鸟类中最高的！',
            '王企鹅会步行120公里去觅食！'
        ];

        const commentNicknames = [
            '游泳的企鹅', '吃鱼的企鹅', '戴帽子的企鹅', '滑雪的企鹅',
            '发呆的企鹅', '唱歌的企鹅', '跳舞的企鹅', '画画的企鹅',
            '胖企鹅', '小企鹅', '企鹅宝宝', '企鹅妈妈', '企鹅爸爸'
        ];

        const residents = [
            { avatar: '🐧', name: '小冰', intro: '画画高手' },
            { avatar: '🎩', name: '胖丁', intro: '美食家' },
            { avatar: '🕶️', name: '酷酷', intro: '冲浪达人' },
            { avatar: '☕', name: '摩卡', intro: '咖啡爱好者' }
        ];

        const sampleNotes = [
            {
                id: Date.now() - 86400000,
                author: 'kk的小企鹅朋友',
                content: '今天看到了一群可爱的小企鹅！它们走路摇摇晃晃的，太可爱啦！今天也要开心每一天！',
                mood: '🥰',
                avatar: '🐧',
                images: [],
                comments: [
                    { author: '游泳的企鹅', text: '好可爱呀！' },
                    { author: '吃鱼的企鹅', text: '羡慕羡慕~' }
                ],
                fishCount: 2,
                createdAt: new Date(Date.now() - 86400000)
            },
            {
                id: Date.now() - 172800000,
                author: '小冰',
                content: '画了一幅企鹅画，感觉还不错呢！分享给大家~',
                mood: '😊',
                avatar: '🎨',
                images: [],
                comments: [
                    { author: '胖丁', text: '画得真好！' }
                ],
                fishCount: 1,
                createdAt: new Date(Date.now() - 172800000)
            },
            {
                id: Date.now() - 259200000,
                author: '胖丁',
                content: '今天吃了好多好吃的鱼！太满足啦~ 你今天开心吗？',
                mood: '😋',
                avatar: '🎩',
                images: [],
                comments: [],
                fishCount: 0,
                createdAt: new Date(Date.now() - 259200000)
            }
        ];

        let notes = [];
        let currentEditId = null;
        let currentDeleteId = null;
        let uploadedImages = [];
        let currentAvatar = '🐧';
        const AVATAR_KEY = 'penguin_avatar';

        // 初始化
        function init() {
            initFloatingElements();
            initResidents();
            loadNotes();
            loadAvatar();
            renderAvatarSelector();
            setDailyQuote();
            setPenguinTip();
            renderMoodSelector();
            updateStats();
            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('hidden');
            }, 1500);
        }

        // 加载头像
        function loadAvatar() {
            const saved = localStorage.getItem(AVATAR_KEY);
            if (saved) {
                currentAvatar = saved;
            }
            updateAvatarDisplay();
        }

        // 保存头像
        function saveAvatar(avatar) {
            currentAvatar = avatar;
            localStorage.setItem(AVATAR_KEY, avatar);
            updateAvatarDisplay();
        }

        // 更新头像显示
        function updateAvatarDisplay() {
            document.getElementById('currentAvatar').textContent = currentAvatar;
            document.getElementById('currentAvatar2').textContent = currentAvatar;
        }

        // 渲染头像选择器
        function renderAvatarSelector() {
            const selector = document.getElementById('avatarSelector');
            selector.innerHTML = penguinAvatars.map(avatar => `
                <span class="avatar-option" onclick="changeAvatar('${avatar}')">${avatar}</span>
            `).join('');
        }

        // 切换头像选择器
        function toggleAvatarSelector() {
            const selector = document.getElementById('avatarSelector');
            selector.classList.toggle('hidden');
        }

        // 更换头像
        function changeAvatar(avatar) {
            saveAvatar(avatar);
            document.getElementById('avatarSelector').classList.add('hidden');
        }

        // 点击外部关闭头像选择器
        document.addEventListener('click', e => {
            const selector = document.getElementById('avatarSelector');
            const headerAvatar = document.querySelector('.header-avatar');
            if (!selector.classList.contains('hidden') && !headerAvatar.contains(e.target)) {
                selector.classList.add('hidden');
            }
        });

        // 初始化背景漂浮元素
        function initFloatingElements() {
            const bg = document.getElementById('floatingBg');
            const elements = ['🐾', '❄️', '⭐', '✨', '💫'];
            for (let i = 0; i < 20; i++) {
                const el = document.createElement('div');
                el.className = 'floating-item';
                el.textContent = elements[Math.floor(Math.random() * elements.length)];
                el.style.left = Math.random() * 100 + '%';
                el.style.top = Math.random() * 100 + '%';
                el.style.animationDelay = Math.random() * 20 + 's';
                el.style.fontSize = (20 + Math.random() * 30) + 'px';
                bg.appendChild(el);
            }
        }

        // 初始化居民
        function initResidents() {
            const saved = localStorage.getItem(RESIDENTS_KEY);
            if (!saved) {
                localStorage.setItem(RESIDENTS_KEY, JSON.stringify(residents));
            }
            renderResidents(saved ? JSON.parse(saved) : residents);
        }

        function renderResidents(data) {
            const container = document.getElementById('residentList');
            container.innerHTML = data.map(r => `
                <div class="resident-item">
                    <span class="resident-avatar">${r.avatar}</span>
                    <div class="resident-info">
                        <h3>${r.name}</h3>
                        <p>${r.intro}</p>
                    </div>
                </div>
            `).join('');
        }

        // 加载笔记
        function loadNotes() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                notes = JSON.parse(saved);
            } else {
                notes = sampleNotes;
                saveNotes();
            }
            renderNotes();
        }

        function saveNotes() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
        }

        function renderNotes() {
            const container = document.getElementById('notesList');
            if (notes.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-penguin">🐧</div>
                        <div class="empty-text">还没有小纸条，快写一张吧~</div>
                    </div>
                `;
                return;
            }

            const sorted = [...notes].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            container.innerHTML = sorted.map(note => createNoteCard(note)).join('');
        }

        function createNoteCard(note) {
            const date = new Date(note.createdAt);
            const timeStr = formatTime(date);
            const fishClass = note.fishCount >= 50 ? 'fish-50' : note.fishCount >= 30 ? 'fish-30' : note.fishCount >= 10 ? 'fish-10' : '';

            return `
                <div class="note-card ${fishClass}" id="note-${note.id}">
                    <span class="paw-tl"></span>
                    <span class="paw-br"></span>
                    <div class="note-header">
                        <span class="note-avatar">${note.avatar}</span>
                        <div class="note-author-info">
                            <div class="note-author">${note.author}</div>
                            <div class="note-time">${timeStr}</div>
                        </div>
                        <span class="mood-tag">${note.mood}</span>
                    </div>
                    <div class="note-content">${escapeHtml(note.content)}</div>
                    ${note.images.length > 0 ? `
                        <div class="note-images">
                            ${note.images.slice(0, 9).map((img, i) => `
                                <div class="note-image" onclick="openLightbox('${img}')">
                                    <img src="${img}" alt="">
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                    <div class="note-actions">
                        <button class="action-btn edit-btn" onclick="openEditModal(${note.id})">✏️ 编辑</button>
                        <button class="action-btn delete-btn" onclick="openConfirmModal(${note.id})">😢 删除</button>
                        <button class="action-btn comment-btn" onclick="toggleComments(${note.id})">💬 留言</button>
                        <div class="fish-count">🐟 ${note.fishCount}</div>
                    </div>
                    <div class="comments-section hidden" id="comments-${note.id}">
                        <div class="comment-list">
                            ${note.comments.map(c => `
                                <div class="comment-item">
                                    <span class="comment-avatar">🐧</span>
                                    <div class="comment-content">
                                        <div class="comment-author">${c.author}</div>
                                        <div class="comment-text">${escapeHtml(c.text)}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="comment-input-wrapper">
                            <input type="text" class="comment-input" id="comment-input-${note.id}" placeholder="说点什么...">
                            <button class="comment-submit" onclick="addComment(${note.id})">🐟</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function formatTime(date) {
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return '刚刚';
            if (minutes < 60) return `${minutes}分钟前`;
            if (hours < 24) return `${hours}小时前`;
            if (days < 7) return `${days}天前`;
            return date.toLocaleDateString('zh-CN');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 每日语录
        function setDailyQuote() {
            const quote = dailyQuotes[Math.floor(Math.random() * dailyQuotes.length)];
            document.getElementById('dailyQuote').textContent = quote;
        }

        // 企鹅小贴士
        function setPenguinTip() {
            const tip = penguinTips[Math.floor(Math.random() * penguinTips.length)];
            document.getElementById('penguinTip').textContent = tip;
        }

        // 渲染心情选择器
        function renderMoodSelector() {
            const container = document.getElementById('moodSelector');
            container.innerHTML = moods.map((m, i) => `
                <span class="mood-option" data-index="${i}" onclick="selectMood(${i})">${m.emoji}</span>
            `).join('');
        }

        let selectedMood = 0;

        function selectMood(index) {
            selectedMood = index;
            document.querySelectorAll('.mood-option').forEach((el, i) => {
                el.classList.toggle('selected', i === index);
            });
        }

        // 图片上传
        function handleImageUpload(event) {
            const files = Array.from(event.target.files);
            files.forEach(file => {
                if (uploadedImages.length >= 9) return;
                const reader = new FileReader();
                reader.onload = e => {
                    uploadedImages.push(e.target.result);
                    renderPreviewImages();
                };
                reader.readAsDataURL(file);
            });
            event.target.value = '';
        }

        function renderPreviewImages() {
            const container = document.getElementById('previewImages');
            container.innerHTML = uploadedImages.map((img, i) => `
                <div class="preview-item">
                    <img src="${img}" alt="">
                    <button class="preview-remove" onclick="removeImage(${i})">×</button>
                </div>
            `).join('');
        }

        function removeImage(index) {
            uploadedImages.splice(index, 1);
            renderPreviewImages();
        }

        // 打开写笔记模态框
        function openWriteModal() {
            currentEditId = null;
            document.getElementById('noteContent').value = '';
            document.getElementById('noteAuthor').value = '';
            uploadedImages = [];
            document.getElementById('previewImages').innerHTML = '';
            selectMood(0);
            document.getElementById('writeModal').classList.add('active');
        }

        function closeWriteModal() {
            document.getElementById('writeModal').classList.remove('active');
        }

        // 提交笔记
        function submitNote() {
            const content = document.getElementById('noteContent').value.trim();
            const author = document.getElementById('noteAuthor').value.trim() || 'kk的小企鹅朋友';

            if (!content) {
                alert('快写点什么吧~');
                return;
            }

            if (currentEditId) {
                const note = notes.find(n => n.id === currentEditId);
                note.content = content;
                note.author = author;
                note.mood = moods[selectedMood].emoji;
                if (uploadedImages.length > 0) {
                    note.images = [...uploadedImages];
                }
            } else {
                const note = {
                    id: Date.now(),
                    author,
                    content,
                    mood: moods[selectedMood].emoji,
                    avatar: penguinAvatars[Math.floor(Math.random() * penguinAvatars.length)],
                    images: [...uploadedImages],
                    comments: [],
                    fishCount: 0,
                    createdAt: new Date()
                };
                notes.unshift(note);
            }

            saveNotes();
            renderNotes();
            updateStats();
            closeWriteModal();
            playPopSound();

            if (!currentEditId) {
                setTimeout(() => {
                    const newCard = document.querySelector('.note-card');
                    if (newCard) {
                        newCard.classList.add('new-note-animation');
                    }
                }, 50);
            }
        }

        // 编辑笔记
        function openEditModal(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;

            currentEditId = id;
            document.getElementById('noteContent').value = note.content;
            document.getElementById('noteAuthor').value = note.author;
            uploadedImages = [...note.images];
            renderPreviewImages();

            const moodIndex = moods.findIndex(m => m.emoji === note.mood);
            selectMood(moodIndex >= 0 ? moodIndex : 0);

            document.getElementById('writeModal').classList.add('active');
        }

        // 删除确认
        function openConfirmModal(id) {
            currentDeleteId = id;
            document.getElementById('confirmModal').classList.add('active');
        }

        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('active');
            currentDeleteId = null;
        }

        function confirmDelete() {
            if (!currentDeleteId) return;

            const card = document.getElementById(`note-${currentDeleteId}`);
            if (card) {
                card.classList.add('delete-animation');
                setTimeout(() => {
                    notes = notes.filter(n => n.id !== currentDeleteId);
                    saveNotes();
                    renderNotes();
                    updateStats();
                    closeConfirmModal();
                }, 500);
            }
        }

        // 留言功能
        function toggleComments(id) {
            const section = document.getElementById(`comments-${id}`);
            section.classList.toggle('hidden');
        }

        function addComment(id) {
            const input = document.getElementById(`comment-input-${id}`);
            const text = input.value.trim();
            if (!text) return;

            const note = notes.find(n => n.id === id);
            if (!note) return;

            const author = commentNicknames[Math.floor(Math.random() * commentNicknames.length)];
            note.comments.push({ author, text });
            note.fishCount++;
            saveNotes();
            renderNotes();
            updateStats();

            setTimeout(() => {
                document.getElementById(`comments-${id}`).classList.remove('hidden');
            }, 50);
        }

        // 图片灯箱
        function openLightbox(src) {
            document.getElementById('lightboxImg').src = src;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        // 更新统计
        function updateStats() {
            const today = new Date().toDateString();
            const todayNotes = notes.filter(n => new Date(n.createdAt).toDateString() === today);
            document.getElementById('todayCount').textContent = todayNotes.length;

            const totalFish = notes.reduce((sum, n) => sum + n.fishCount, 0);
            document.getElementById('totalFish').textContent = totalFish;
        }

        // 简单的音效
        function playPopSound() {
            if (typeof AudioContext !== 'undefined' || typeof webkitAudioContext !== 'undefined') {
                const ctx = new (AudioContext || webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 500;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.2);
            }
        }

        // 点击模态框外部关闭
        document.getElementById('writeModal').addEventListener('click', e => {
            if (e.target.id === 'writeModal') closeWriteModal();
        });

        document.getElementById('confirmModal').addEventListener('click', e => {
            if (e.target.id === 'confirmModal') closeConfirmModal();
        });

        // 键盘事件
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                closeWriteModal();
                closeConfirmModal();
                closeLightbox();
            }
        });

        // 初始化应用
        init();
    </script>
</body>
</html>
